<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Assistant</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-accent"></div>
      <h2>Memory Assistant</h2>
    </div>

    <!-- Config -->
    <div class="dir-row">
      <span id="dirName" class="dir-name">未选择目录</span>
      <button id="selectDirBtn" class="btn-sm">选择目录</button>
      <button id="syncBtn" class="btn-sm btn-confirm" disabled>同步</button>
    </div>
    <div class="dir-row">
      <span id="apiKeyStatus" class="dir-name">API Key: 未配置</span>
      <button id="apiKeyBtn" class="btn-sm">设置</button>
    </div>
    <div id="apiKeyPanel" class="api-key-panel hidden">
      <input type="password" id="apiKeyInput" placeholder="sk-..." />
      <button id="apiKeySaveBtn" class="btn-sm btn-confirm">保存</button>
    </div>

    <!-- Section 1: 历史导入 -->
    <div class="section">
      <div class="section-title">历史导入</div>
      <input type="file" id="importFileInput" accept=".json">
      <button id="importFileBtn" class="btn-full">导入 ChatGPT / DeepSeek 历史文件</button>
      <div class="import-hint">支持 ChatGPT / DeepSeek 导出格式，自动识别平台<br>ChatGPT：先从导出 ZIP 中解压 conversations.json</div>
    </div>

    <!-- Section 2: 实时捕获 -->
    <div class="section">
      <div class="section-title">实时捕获</div>
      <div class="toggle-row">
        <span class="toggle-label">保持更新</span>
        <label class="toggle-switch">
          <input type="checkbox" id="keepUpdatedToggle">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="toggle-row" id="realtimeRow" style="display:none">
        <span class="toggle-label">实时更新</span>
        <label class="toggle-switch">
          <input type="checkbox" id="realtimeUpdateToggle">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <button id="exportMemoryBtn" class="btn-full">手动导出当前对话</button>
    </div>

    <!-- Section 3: 记忆管理与导出 -->
    <div class="section">
      <div class="section-title">记忆管理与导出</div>
      <button id="importMemoryBtn" class="btn-full">选择记忆节点</button>
      <div id="importPanel" class="import-panel hidden">
        <div id="persistentList" class="persistent-list"></div>
        <div class="export-target-row">
          <span class="export-target-label">目标平台</span>
          <select id="exportTargetSelect">
            <option value="claude">Claude</option>
            <option value="chatgpt">ChatGPT</option>
            <option value="deepseek">DeepSeek</option>
            <option value="generic">通用</option>
          </select>
        </div>
        <div class="btn-row">
          <button id="confirmImportBtn" class="btn-half btn-confirm">注入当前对话</button>
          <button id="exportBootstrapBtn" class="btn-half">导出文件</button>
        </div>
      </div>
      <div class="btn-row">
        <button id="rebuildBtn" class="btn-half btn-muted">重建记忆节点</button>
        <button id="consolidateBtn" class="btn-half btn-muted">整理节点</button>
      </div>
    </div>

    <div id="result" class="result hidden"></div>
  </div>

  <script src="../config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
