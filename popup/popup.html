<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Assistant</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-accent"></div>
      <h2>Memory Assistant</h2>
    </div>

    <!-- Config -->
    <div class="dir-row">
      <span id="dirName" class="dir-name">No folder selected</span>
      <button id="selectDirBtn" class="btn-sm">Choose Folder</button>
      <button id="syncBtn" class="btn-sm btn-confirm" disabled>Sync</button>
    </div>
    <div class="dir-row">
      <span id="apiKeyStatus" class="dir-name">API Key: Not set</span>
      <button id="apiKeyBtn" class="btn-sm">Configure</button>
    </div>
    <div id="apiKeyPanel" class="api-key-panel hidden">
      <input type="password" id="apiKeyInput" placeholder="sk-..." />
      <button id="apiKeySaveBtn" class="btn-sm btn-confirm">Save</button>
    </div>

    <!-- Section 1: History Import -->
    <div class="section">
      <div class="section-title">History Import</div>
      <input type="file" id="importFileInput" accept=".json">
      <button id="importFileBtn" class="btn-full">Import ChatGPT / DeepSeek History</button>
      <div class="import-hint">Supports ChatGPT / DeepSeek export format, platform auto-detected<br>ChatGPT: unzip the export archive and use conversations.json</div>
    </div>

    <!-- Section 2: Live Capture -->
    <div class="section">
      <div class="section-title">Live Capture</div>
      <div class="toggle-row">
        <span class="toggle-label">Keep Updated</span>
        <label class="toggle-switch">
          <input type="checkbox" id="keepUpdatedToggle">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="toggle-row" id="realtimeRow" style="display:none">
        <span class="toggle-label">Realtime Update</span>
        <label class="toggle-switch">
          <input type="checkbox" id="realtimeUpdateToggle">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <button id="exportMemoryBtn" class="btn-full">Export Current Conversation</button>
    </div>

    <!-- Section 3: Memory Management & Export -->
    <div class="section">
      <div class="section-title">Memory Management &amp; Export</div>
      <button id="importMemoryBtn" class="btn-full">Browse Memory Nodes</button>
      <div id="importPanel" class="import-panel hidden">
        <div id="persistentList" class="persistent-list"></div>
        <div class="export-target-row">
          <span class="export-target-label">Target Platform</span>
          <select id="exportTargetSelect">
            <option value="claude">Claude</option>
            <option value="chatgpt">ChatGPT</option>
            <option value="deepseek">DeepSeek</option>
            <option value="generic">Generic</option>
          </select>
        </div>
        <div class="btn-row">
          <button id="confirmImportBtn" class="btn-half btn-confirm">Inject into Chat</button>
          <button id="exportBootstrapBtn" class="btn-half">Export File</button>
        </div>
      </div>
      <div class="btn-row">
        <button id="rebuildBtn" class="btn-half btn-muted">Rebuild Nodes</button>
        <button id="consolidateBtn" class="btn-half btn-muted">Consolidate Nodes</button>
      </div>
    </div>

    <div id="result" class="result hidden"></div>
  </div>

  <script src="../config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
