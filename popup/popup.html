<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>记忆迁移</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="brand-block">
        <div class="brand-icon" aria-hidden="true">
          <span></span>
          <span></span>
        </div>
        <div class="brand-copy">
          <h1>记忆迁移</h1>
          <p>让你的对话记忆，随你而行</p>
        </div>
      </div>
      <button id="menuBtn" class="icon-btn" type="button" aria-label="更多">
        <span></span><span></span><span></span>
      </button>
    </header>

    <main class="app-main">
      <section id="homeView" class="view is-active">
        <div class="sync-stage">
          <div class="sync-ring">
            <button id="syncBtn" class="sync-button" type="button" aria-pressed="false">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M4 4v5h5" />
                <path d="M20 20v-5h-5" />
                <path d="M20 9A8 8 0 0 0 6.2 6.1L4 9" />
                <path d="M4 15a8 8 0 0 0 13.8 2.9L20 15" />
              </svg>
              <strong>同步</strong>
            </button>
          </div>
          <div class="sync-meta">
            <div class="sync-status-line">
              <span id="syncDot" class="status-dot"></span>
              <span id="syncStatusText">同步已暂停</span>
            </div>
            <p id="syncHintText">点击开启后，持续记录你与大模型的对话</p>
          </div>
        </div>

        <button id="gotoMigrateBtn" class="primary-strip-btn" type="button">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M14 5l7 7-7 7" />
            <path d="M21 12H3" />
          </svg>
          <span>迁移</span>
        </button>

        <div class="dual-actions">
          <button id="gotoSettingsBtn" class="secondary-card-btn" type="button">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="12" cy="12" r="3"></circle>
              <path d="M19.4 15a1.6 1.6 0 0 0 .3 1.7l.1.1a2 2 0 0 1 0 2.8 2 2 0 0 1-2.8 0l-.1-.1a1.6 1.6 0 0 0-1.7-.3 1.6 1.6 0 0 0-1 1.4V21a2 2 0 0 1-4 0v-.2a1.6 1.6 0 0 0-1-1.4 1.6 1.6 0 0 0-1.7.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0 .3-1.7 1.6 1.6 0 0 0-1.4-1H3a2 2 0 0 1 0-4h.2a1.6 1.6 0 0 0 1.4-1 1.6 1.6 0 0 0-.3-1.7l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.7.3H9a1.6 1.6 0 0 0 1-1.4V3a2 2 0 0 1 4 0v.2a1.6 1.6 0 0 0 1 1.4 1.6 1.6 0 0 0 1.7-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.7V9a1.6 1.6 0 0 0 1.4 1H21a2 2 0 0 1 0 4h-.2a1.6 1.6 0 0 0-1.4 1z"></path>
            </svg>
            <span>设置</span>
          </button>
          <button id="gotoSkillBtn" class="secondary-card-btn" type="button">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <rect x="5" y="3" width="14" height="18" rx="3"></rect>
              <path d="M9 8h6"></path>
              <path d="M9 12h6"></path>
            </svg>
            <span>Skill</span>
          </button>
        </div>

        <div class="stats-card">
          <div class="stat-row">
            <span>最近同步</span>
            <strong id="lastSyncValue">未开始</strong>
          </div>
          <div class="stat-row">
            <span>已记录对话</span>
            <strong id="conversationCountValue">0 条</strong>
          </div>
          <div class="stat-row">
            <span>记忆条目</span>
            <strong id="memoryCountValue">0 条</strong>
          </div>
        </div>
      </section>

      <section id="migrateView" class="view">
        <div class="view-head">
          <button data-back="home" class="back-btn" type="button" aria-label="返回">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M15 18l-6-6 6-6" />
            </svg>
          </button>
          <h2>迁移</h2>
          <span class="view-head-spacer"></span>
        </div>

        <div class="section-block">
          <h3>整理记忆</h3>
          <p>归并、去重并生成可迁移的记忆包</p>
          <div class="stacked-actions">
            <button id="organizeBtn" class="mid-primary-btn" type="button">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M12 3l8 4.5-8 4.5-8-4.5L12 3z"></path>
                <path d="M4 12l8 4.5 8-4.5"></path>
                <path d="M4 16.5L12 21l8-4.5"></path>
              </svg>
              <span>整理</span>
            </button>
            <button id="addCurrentConversationBtn" class="mid-secondary-btn" type="button">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M12 6v12"></path>
                <path d="M6 12h12"></path>
              </svg>
              <span>加入当前对话</span>
            </button>
          </div>
        </div>

        <div class="section-divider"></div>

        <div class="section-block">
          <h3>勾选记忆内容</h3>
          <div class="selection-list">
            <label class="selection-row">
              <input type="checkbox" data-category="profile" checked>
              <span>用户画像</span>
              <em id="countProfile">0</em>
            </label>
            <label class="selection-row">
              <input type="checkbox" data-category="preferences" checked>
              <span>偏好设置</span>
              <em id="countPreferences">0</em>
            </label>
            <label class="selection-row">
              <input type="checkbox" data-category="projects">
              <span>项目记忆</span>
              <em id="countProjects">0</em>
            </label>
            <label class="selection-row">
              <input type="checkbox" data-category="workflows" checked>
              <span>工作流 / SOP</span>
              <em id="countWorkflows">0</em>
            </label>
            <label class="selection-row">
              <input type="checkbox" data-category="persistent">
              <span>Persistent Memory</span>
              <em id="countPersistent">0</em>
            </label>
          </div>
        </div>

        <div class="bottom-actions">
          <button id="exportPackageBtn" class="ghost-action-btn" type="button">导出</button>
          <button id="injectPackageBtn" class="solid-action-btn" type="button">注入</button>
        </div>
      </section>

      <section id="skillView" class="view">
        <div class="view-head">
          <button data-back="home" class="back-btn" type="button" aria-label="返回">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M15 18l-6-6 6-6" />
            </svg>
          </button>
          <h2>Skill</h2>
          <span class="view-head-spacer"></span>
        </div>

        <div class="skill-tabs">
          <button id="mySkillTab" class="skill-tab is-active" type="button">我的 Skill</button>
          <button id="recommendedSkillTab" class="skill-tab" type="button">为你推荐</button>
        </div>

        <div id="skillList" class="skill-list"></div>

        <div class="bottom-actions">
          <button id="saveSkillBtn" class="ghost-action-btn" type="button">保存</button>
          <button id="injectSkillBtn" class="solid-action-btn" type="button">注入当前会话</button>
        </div>
      </section>

      <section id="settingsView" class="view">
        <div class="view-head">
          <button data-back="home" class="back-btn" type="button" aria-label="返回">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M15 18l-6-6 6-6" />
            </svg>
          </button>
          <h2>设置</h2>
          <span class="view-head-spacer"></span>
        </div>

        <div class="settings-card">
          <h3>API 配置</h3>
          <label class="field-label" for="apiKeyInput">DeepSeek API Key</label>
          <div class="field-row">
            <input id="apiKeyInput" class="text-input" type="password" placeholder="请输入 DeepSeek API Key" autocomplete="off">
            <button id="testConnectionBtn" class="outline-mini-btn" type="button">测试连接</button>
          </div>
          <label class="field-label" for="backendUrlInput">本地后端地址</label>
          <div class="field-row">
            <input id="backendUrlInput" class="text-input" type="text" placeholder="http://127.0.0.1:8765">
            <button id="saveSettingsBtn" class="outline-mini-btn" type="button">保存</button>
          </div>
          <p id="apiKeyStatus" class="helper-text">API Key: 未配置</p>
        </div>

        <div class="settings-card">
          <h3>本地目录</h3>
          <div class="field-row">
            <input id="storageDirInput" class="text-input" type="text" placeholder="请输入或选择本地存储目录">
            <button id="selectDirBtn" class="outline-mini-btn" type="button">选择目录</button>
          </div>
        </div>

        <div class="settings-card">
          <h3>同步策略</h3>
          <label class="toggle-row">
            <span>
              <strong>保持更新</strong>
              <em>同步时保留本地未同步记录</em>
            </span>
            <input id="keepUpdatedToggle" class="toggle-input" type="checkbox">
          </label>
          <label class="toggle-row">
            <span>
              <strong>实时更新</strong>
              <em>新对话到来后自动更新记忆</em>
            </span>
            <input id="realtimeUpdateToggle" class="toggle-input" type="checkbox">
          </label>
        </div>

        <div class="settings-card">
          <h3>数据管理</h3>
          <button id="importHistoryBtn" class="settings-action-row" type="button">
            <span>导入历史</span>
            <small>导入 ChatGPT / DeepSeek 历史记录</small>
          </button>
          <button id="clearCacheBtn" class="settings-action-row danger-row" type="button">
            <span>清理缓存</span>
            <small>清理本地临时缓存，保留主记忆文件</small>
          </button>
        </div>

        <p class="settings-note">高级同步选项先放在这里，首页只保留一个同步入口。</p>
      </section>

      <div id="toast" class="toast hidden"></div>
      <input id="importFileInput" type="file" accept=".json" hidden>
    </main>
  </div>

  <script src="../config.js"></script>
  <script src="api/backend.js"></script>
  <script src="popup.js"></script>
</body>
</html>
