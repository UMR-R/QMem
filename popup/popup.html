<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Assistant</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- ── Header ── -->
  <header class="header">
    <div class="brand">
      <div class="brand-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M12 3C9.2 3 7 5 7 7.5c0 .6.1 1.1.3 1.6H7C5.3 9.1 4 10.4 4 12s1.3 2.9 3 2.9h10c1.7 0 3-1.3 3-2.9s-1.3-2.9-3-2.9h-.3c.2-.5.3-1 .3-1.6C17 5 14.8 3 12 3z" stroke="#6B63FF" stroke-width="1.7" fill="rgba(107,99,255,0.1)" stroke-linejoin="round"/>
          <path d="M9 15v3M12 15v4M15 15v3" stroke="#6B63FF" stroke-width="1.7" stroke-linecap="round"/>
          <circle cx="9.5" cy="11" r="1" fill="#6B63FF"/>
          <circle cx="14.5" cy="11" r="1" fill="#6B63FF"/>
          <path d="M10.5 13.2c.4.3.9.5 1.5.5s1.1-.2 1.5-.5" stroke="#6B63FF" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="brand-name">Memory</span>
      <span class="brand-sub">Assistant</span>
    </div>
    <button class="pill-btn" id="apiKeyBtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"/>
        <path d="M5 20c0-3.31 3.13-6 7-6s7 2.69 7 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      API Key
    </button>
  </header>

  <!-- ── API Key Panel ── -->
  <div id="apiKeyPanel" class="api-panel hidden">
    <span id="apiKeyStatus" class="api-status-label">API Key: 未配置</span>
    <div class="api-input-row">
      <input type="password" id="apiKeyInput" class="api-input" placeholder="sk-…" autocomplete="off"/>
      <button id="apiKeySaveBtn" class="btn-save">保存</button>
    </div>
  </div>

  <!-- ── Main ── -->
  <main class="main">

    <!-- Big circle -->
    <div class="circle-scene">
      <div class="dashed-ring">
        <button id="selectDirBtn" class="circle-btn">同步</button>
      </div>
    </div>

    <!-- Dir badge -->
    <div class="dir-badge">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      </svg>
      <span id="dirName">未选择目录</span>
    </div>

    <!-- Toggles card -->
    <div class="toggle-card">
      <div class="toggle-row">
        <div class="toggle-left">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="#6B63FF" stroke-width="2"/>
            <polyline points="12 6 12 12 16 14" stroke="#6B63FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>保持更新</span>
        </div>
        <label class="ios-toggle">
          <input type="checkbox" id="keepUpdatedToggle">
          <span class="ios-track"></span>
        </label>
      </div>

      <!-- realtimeRow is a plain block wrapper; JS shows/hides it -->
      <div id="realtimeRow" style="display:none">
        <div class="card-sep"></div>
        <div class="toggle-row">
          <div class="toggle-left">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" stroke="#6B63FF" stroke-width="2" stroke-linejoin="round"/>
            </svg>
            <span>实时更新</span>
          </div>
          <label class="ios-toggle">
            <input type="checkbox" id="realtimeUpdateToggle">
            <span class="ios-track"></span>
          </label>
        </div>
      </div>
    </div>

    <!-- Export pill button -->
    <button id="exportMemoryBtn" class="export-btn">导出并保存记忆</button>

    <!-- Result area -->
    <div id="result" class="result hidden"></div>

    <!-- Hidden file input -->
    <input type="file" id="importFileInput" accept=".json" style="display:none">

    <!-- Tag-based import panel -->
    <div id="importPanel" class="import-panel hidden">
      <div id="persistentList" class="persistent-list"></div>
      <button id="confirmImportBtn" class="btn-confirm">确认导入选中节点</button>
    </div>

  </main>

  <!-- ── Footer ── -->
  <footer class="footer">
    <button class="footer-btn" id="importFileBtn">导入历史</button>
    <span class="footer-sep">|</span>
    <button class="footer-btn" id="rebuildBtn">重建节点</button>
    <span class="footer-sep">|</span>
    <button class="footer-btn" id="consolidateBtn">整理节点</button>
    <span class="footer-sep">|</span>
    <button class="footer-btn" id="importMemoryBtn">按标签导入</button>
  </footer>

  <script src="../config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
